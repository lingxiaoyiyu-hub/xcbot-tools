<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公益站导航 - 小乘工具箱</title>
<style>
:root{--bg:#090d16;--card:#131b2e;--cb:#1e293b;--primary:#3b82f6;--phover:#2563eb;--text:#f8fafc;--muted:#64748b;--success:#10b981;--danger:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* Header */
header{height:56px;border-bottom:1px solid var(--cb);display:flex;align-items:center;padding:0 24px;background:rgba(9,13,22,.8);backdrop-filter:blur(12px);z-index:10;position:sticky;top:0}
.logo{font-size:1.05rem;font-weight:700;color:var(--primary);display:flex;align-items:center;gap:8px;text-decoration:none}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:16px}
.nav-link{color:var(--muted);font-size:.88rem;text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-link:hover{color:var(--primary)}
.feedback-btn{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--primary);padding:6px 14px;border-radius:99px;font-size:.82rem;cursor:pointer;transition:all .2s;font-weight:600}
.feedback-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Announcement */
#announceBanner{display:none;background:linear-gradient(90deg,rgba(245,158,11,.12),rgba(245,158,11,.06));border-bottom:1px solid rgba(245,158,11,.25);padding:10px 24px;font-size:.88rem;color:var(--warn);align-items:center;gap:10px;position:sticky;top:56px;z-index:9}
#announceBanner span{flex:1}
#announceBanner button{background:none;border:none;color:var(--warn);cursor:pointer;font-size:1.1rem;opacity:.7;padding:0 4px}
#announceBanner button:hover{opacity:1}

/* Main */
.container{max-width:1000px;width:100%;margin:0 auto;padding:32px 24px;flex:1;display:flex;flex-direction:column;gap:24px}
.info-card{background:linear-gradient(135deg,rgba(59,130,246,.08) 0%,rgba(16,185,129,.04) 100%);border:1px solid var(--cb);border-radius:16px;padding:24px}
.info-title{font-size:1.4rem;font-weight:800;margin-bottom:8px;background:linear-gradient(to right,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.info-desc{font-size:.9rem;color:var(--muted);line-height:1.6}

/* Controls */
.controls-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--cb);padding-bottom:16px}
.tags-filter{display:flex;gap:8px;flex-wrap:wrap}
.tag-btn{background:rgba(255,255,255,.03);border:1px solid var(--cb);color:var(--muted);padding:6px 14px;border-radius:99px;font-size:.8rem;cursor:pointer;transition:all .2s}
.tag-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.tag-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.search-box{position:relative;max-width:300px;width:100%}
.search-input{width:100%;background:var(--card);border:1px solid var(--cb);color:var(--text);border-radius:99px;padding:8px 16px 8px 36px;font-size:.88rem;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--primary)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}

/* Grid */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.site-card{background:var(--card);border:1px solid var(--cb);border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:12px;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative}
.site-card:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.4);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between}
.site-name-area{display:flex;flex-direction:column;gap:2px}
.site-title{font-size:1.1rem;font-weight:700}
.site-domain{font-size:.76rem;color:var(--muted)}
.card-tags{display:flex;gap:4px;flex-wrap:wrap}
.card-tag{font-size:.65rem;padding:2px 6px;border-radius:4px;background:rgba(59,130,246,.1);color:var(--primary);border:1.5px solid rgba(59,130,246,.2);font-weight:600}
.site-desc{font-size:.8rem;color:#94a3b8;line-height:1.5;flex:1}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.latency-indicator{font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:4px}
.latency-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);display:inline-block}
.latency-dot.online{background:var(--success)}
.latency-dot.offline{background:var(--danger)}
.visit-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--text);border-radius:8px;padding:6px 12px;font-size:.78rem;text-decoration:none;cursor:pointer;transition:all .2s;font-weight:600}
.visit-btn:hover{background:var(--primary);border-color:var(--primary);color:#fff}
.test-btn{background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;text-decoration:underline}
.test-btn:hover{color:var(--primary)}

/* Feedback Modal */
.modal-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--cb);border-radius:20px;padding:32px;width:480px;max-width:95vw;display:flex;flex-direction:column;gap:20px;box-shadow:0 24px 64px rgba(0,0,0,.5);position:relative}
.modal-title{font-size:1.1rem;font-weight:800;color:var(--text)}
.modal-sub{font-size:.84rem;color:var(--muted);line-height:1.6;margin-top:-12px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;padding:4px}
.modal-close:hover{color:var(--text)}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:.76rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.form-input,.form-textarea{background:rgba(255,255,255,.04);border:1px solid var(--cb);border-radius:8px;color:var(--text);padding:10px 12px;font-size:.88rem;font-family:inherit;outline:none;transition:border-color .2s;width:100%}
.form-input:focus,.form-textarea:focus{border-color:var(--primary)}
.form-textarea{resize:vertical}
.btn-row{display:flex;gap:10px}
.btn{padding:10px 20px;border-radius:8px;font-size:.88rem;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--phover)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--cb)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.fb-success{display:none;text-align:center;color:var(--success);font-size:.92rem;padding:12px;background:rgba(16,185,129,.08);border-radius:10px;border:1px solid rgba(16,185,129,.2)}

/* Footer */
footer{padding:24px;text-align:center;border-top:1px solid var(--cb);font-size:.78rem;color:var(--muted)}
</style>
<link rel="stylesheet" href="../shared-white.css">
</head>
<body>

<header>
  <a href="../" class="logo">
    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
      <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
      <polyline points="2 17 12 22 22 17"></polyline>
      <polyline points="2 12 12 17 22 12"></polyline>
    </svg>
    <span>公益站导航</span>
  </a>
  <div class="header-actions">
    <button class="feedback-btn" onclick="openFeedback()">
      ✉️ 投稿反馈
    </button>
    <a href="admin.html" class="nav-link">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      后台管理
    </a>
    <a href="../" class="nav-link">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      首页
    </a>
  </div>
</header>

<!-- Announcement Banner -->
<div id="announceBanner" style="display:none">
  <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none" style="flex-shrink:0">
    <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
  </svg>
  <span id="announceText"></span>
  <button onclick="document.getElementById('announceBanner').style.display='none'" title="关闭公告">&times;</button>
</div>

<div class="container">
  <div class="info-card">
    <div class="info-title">公益站导航</div>
    <div class="info-desc">
      这里整理可以免费使用的大模型、AI 聊天、AI 绘图和公益中转站入口，方便快速找到能直接打开体验的 AI 资源。站点信息会按日常可用性持续筛选更新，使用时请注意保护账号、隐私和敏感内容。
    </div>
  </div>

  <div class="controls-row">
    <div class="tags-filter" id="tagsFilter">
      <button class="tag-btn active" data-tag="全部">全部</button>
      <button class="tag-btn" data-tag="签到">签到</button>
      <button class="tag-btn" data-tag="生图">生图</button>
      <button class="tag-btn" data-tag="稳定">稳定</button>
    </div>
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" class="search-input" placeholder="搜索站点或类型...">
    </div>
  </div>

  <div class="sites-grid" id="sitesGrid"></div>
</div>

<footer>
  <p>&copy; 2026 公益站导航. 所有收录信息均来自公开共享，本站不对任何收录中转站及其活动负责。</p>
</footer>

<!-- Feedback Modal -->
<div class="modal-overlay" id="feedbackModal">
  <div class="modal">
    <button class="modal-close" onclick="closeFeedback()">&times;</button>
    <div class="modal-title">✉️ 投稿 &amp; 反馈</div>
    <div class="modal-sub">推荐一个好站，或者告诉我们哪个站挂了。感谢参与建设！</div>

    <div id="fbForm" style="display:flex;flex-direction:column;gap:16px">
      <div class="form-group">
        <label class="form-label">昵称（选填）</label>
        <input type="text" id="fbName" class="form-input" placeholder="匿名">
      </div>
      <div class="form-group">
        <label class="form-label">站点链接（选填）</label>
        <input type="text" id="fbUrl" class="form-input" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label class="form-label">反馈内容 *</label>
        <textarea id="fbMessage" class="form-textarea" rows="4" placeholder="推荐理由、福利说明、或者某个站出了问题..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitFeedback()">提交</button>
        <button class="btn btn-ghost" onclick="closeFeedback()">取消</button>
      </div>
    </div>

    <div class="fb-success" id="fbSuccess">
      🎉 感谢您的投稿！我们会尽快审核处理。
    </div>
  </div>
</div>

<script>
let allSites = [];
let activeTag = '全部';

// ─── Load ─────────────────────────────────────────
async function loadSites() {
  try {
    const res = await fetch('sites.json?t=' + Date.now());
    const data = await res.json();

    // New format: { announcement, sites }
    if (Array.isArray(data)) {
      allSites = data;
    } else {
      allSites = data.sites || [];
      // Show announcement if enabled
      const ann = data.announcement;
      if (ann && ann.enabled && ann.text) {
        document.getElementById('announceText').textContent = ann.text;
        document.getElementById('announceBanner').style.display = 'flex';
      }
    }
    renderSites();
  } catch (err) {
    document.getElementById('sitesGrid').innerHTML =
      '<div style="grid-column:1/-1;text-align:center;color:var(--danger);padding:40px">数据文件加载失败，请稍后再试。</div>';
  }
}

// ─── Render ───────────────────────────────────────
function renderSites() {
  const grid = document.getElementById('sitesGrid');
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allSites.filter(s => {
    const matchTag = activeTag === '全部' || (s.tags || []).includes(activeTag);
    const matchQ = s.name.toLowerCase().includes(q) || s.domain.toLowerCase().includes(q);
    return matchTag && matchQ;
  });

  if (!filtered.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:40px">没有符合条件的站点。</div>';
    return;
  }

  grid.innerHTML = filtered.map(s => `
    <div class="site-card">
      <div class="card-header">
        <div class="site-name-area">
          <span class="site-title">${esc(s.name)}</span>
        </div>
        <div class="card-tags">
          ${(s.tags||[]).map(t => '<span class="card-tag">' + esc(t) + '</span>').join('')}
        </div>
      </div>
      <div class="site-desc">${esc(s.description)}</div>
      <div class="card-footer">
        <div class="latency-indicator" id="lat-${s.id}">
          <span class="latency-dot"></span>
          <button class="test-btn" onclick="testPing('${s.id}','${esc(s.url)}')">联通性测试</button>
        </div>
        <a href="${esc(s.url)}" target="_blank" class="visit-btn">打开链接</a>
      </div>
    </div>
  `).join('');
}

// ─── Ping ─────────────────────────────────────────
async function testPing(id, url) {
  const el = document.getElementById('lat-' + id);
  if (!el) return;
  el.innerHTML = '<span class="latency-dot"></span><span style="color:var(--muted)">测试中...</span>';
  const t0 = Date.now();
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 6000);
    await fetch(url, { mode: 'no-cors', cache: 'no-cache', signal: ctrl.signal });
    clearTimeout(tid);
    const ms = Date.now() - t0;
    el.innerHTML = '<span class="latency-dot online"></span><span style="color:var(--success)">在线 (' + ms + 'ms)</span>';
  } catch {
    el.innerHTML = '<span class="latency-dot offline"></span><span style="color:var(--danger)">超时 / 离线</span>';
  }
}

// ─── Feedback Modal ───────────────────────────────
function openFeedback() {
  document.getElementById('feedbackModal').classList.add('show');
  document.getElementById('fbSuccess').style.display = 'none';
  document.getElementById('fbForm').style.display = 'flex';
  document.getElementById('fbMessage').value = '';
  document.getElementById('fbUrl').value = '';
  document.getElementById('fbName').value = '';
}

function closeFeedback() {
  document.getElementById('feedbackModal').classList.remove('show');
}

function submitFeedback() {
  const msg = document.getElementById('fbMessage').value.trim();
  if (!msg) { alert('请填写反馈内容！'); return; }

  const fb = {
    id: String(Date.now()),
    name: document.getElementById('fbName').value.trim() || '匿名',
    url: document.getElementById('fbUrl').value.trim(),
    message: msg,
    time: new Date().toLocaleString('zh-CN'),
    read: false
  };

  const list = JSON.parse(localStorage.getItem('nav_feedbacks') || '[]');
  list.push(fb);
  localStorage.setItem('nav_feedbacks', JSON.stringify(list));

  document.getElementById('fbForm').style.display = 'none';
  document.getElementById('fbSuccess').style.display = 'block';
  setTimeout(closeFeedback, 2000);
}

// Close modal on backdrop click
document.getElementById('feedbackModal').addEventListener('click', function(e) {
  if (e.target === this) closeFeedback();
});

// ─── Helpers ──────────────────────────────────────
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Event Listeners ──────────────────────────────
document.getElementById('searchInput').addEventListener('input', renderSites);
document.querySelectorAll('#tagsFilter .tag-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    document.querySelectorAll('#tagsFilter .tag-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeTag = e.target.dataset.tag;
    renderSites();
  });
});

window.onload = loadSites;
</script>
</body>
</html>
