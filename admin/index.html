<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>管理后台 | XCbot</title>
<style>
:root{--bg:#f5f7fb;--panel:#fff;--line:#e5e7eb;--text:#111827;--muted:#6b7280;--blue:#2563eb;--blue-soft:#eff6ff;--danger:#dc2626}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
button,input,textarea{font:inherit}button{cursor:pointer}.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-box{width:min(380px,100%);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:28px;box-shadow:0 12px 36px rgba(15,23,42,.08)}.brand{font-size:1.15rem;font-weight:800;margin-bottom:6px}.muted{color:var(--muted);font-size:.88rem}.login input,.field input,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;background:#fff;color:var(--text);outline:none}.login input{margin:20px 0 10px}.login input:focus,.field input:focus,.field textarea:focus{border-color:#93c5fd;box-shadow:0 0 0 3px var(--blue-soft)}.primary{border:0;border-radius:8px;background:var(--blue);color:#fff;padding:10px 16px;font-weight:700}.primary:hover{background:#1d4ed8}.error{min-height:20px;color:var(--danger);font-size:.82rem}.app{display:none;min-height:100vh}.top{height:60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;gap:20px}.top .muted{margin-left:auto}.logout{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 12px;color:var(--muted)}.layout{display:grid;grid-template-columns:180px minmax(0,1fr);min-height:calc(100vh - 60px)}.side{background:#fff;border-right:1px solid var(--line);padding:16px 10px}.side button{display:block;width:100%;text-align:left;border:0;background:transparent;color:var(--muted);padding:10px 12px;border-radius:7px;margin-bottom:4px}.side button.active,.side button:hover{background:var(--blue-soft);color:var(--blue);font-weight:700}.content{padding:24px;min-width:0}.view{display:none}.view.active{display:block}.view-title{margin:0 0 4px;font-size:1.35rem}.view-subtitle{margin:0 0 20px;color:var(--muted);font-size:.9rem}.overview-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}.stat-label{color:var(--muted);font-size:.8rem}.stat-value{font-size:1.6rem;font-weight:800;margin-top:6px}.frame-wrap{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}.frame{display:block;width:100%;height:calc(100vh - 150px);min-height:620px;border:0}.seo-layout{display:grid;grid-template-columns:280px minmax(0,1fr);gap:14px}.panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px}.list{display:grid;gap:6px;margin-top:12px}.list button{border:1px solid transparent;background:#fff;border-radius:8px;text-align:left;padding:10px}.list button:hover,.list button.active{background:var(--blue-soft);border-color:#bfdbfe;color:#1d4ed8}.field{display:grid;gap:6px;margin-bottom:13px}.field label{font-weight:700;font-size:.82rem}.field textarea{resize:vertical;min-height:260px;line-height:1.7}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.actions{display:flex;gap:8px;align-items:center}.ghost{border:1px solid var(--line);border-radius:8px;background:#fff;padding:9px 14px}.danger{color:var(--danger)}.empty{color:var(--muted);padding:20px;text-align:center;font-size:.88rem}@media(max-width:820px){.layout{grid-template-columns:1fr}.side{border-right:0;border-bottom:1px solid var(--line);display:flex;overflow:auto;padding:8px}.side button{white-space:nowrap;margin:0 4px 0 0}.content{padding:16px}.overview-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.seo-layout{grid-template-columns:1fr}.frame{min-height:540px;height:calc(100vh - 190px)}}
</style>
</head>
<body>
<section class="login" id="loginView"><form class="login-box" id="loginForm"><div class="brand">XCbot 管理后台</div><div class="muted">请输入管理密码</div><input id="password" type="password" autocomplete="current-password" autofocus><div class="error" id="loginError"></div><button class="primary" type="submit">登录</button></form></section>
<section class="app" id="appView">
  <header class="top"><strong>XCbot 管理后台</strong><span class="muted">主站内容管理</span><button class="logout" id="logoutBtn">退出</button></header>
  <div class="layout">
    <nav class="side"><button class="active" data-view="overview">概览</button><button data-view="api">AI/API 导航</button><button data-view="common">常用网站</button><button data-view="seo">SEO 文章</button></nav>
    <main class="content">
      <section class="view active" id="view-overview"><h1 class="view-title">概览</h1><p class="view-subtitle">内容管理入口</p><div class="overview-grid"><div class="stat"><div class="stat-label">API 导航</div><div class="stat-value" id="apiCount">-</div></div><div class="stat"><div class="stat-label">常用网站</div><div class="stat-value" id="commonCount">-</div></div><div class="stat"><div class="stat-label">教程</div><div class="stat-value" id="tutorialCount">-</div></div><div class="stat"><div class="stat-label">SEO 文章</div><div class="stat-value" id="seoCount">-</div></div></div></section>
      <section class="view" id="view-api"><h1 class="view-title">AI/API 导航</h1><p class="view-subtitle">编辑站点、教程、投稿和统计</p><div class="frame-wrap"><iframe class="frame" id="apiFrame" title="AI/API 导航管理"></iframe></div></section>
      <section class="view" id="view-common"><h1 class="view-title">常用网站</h1><p class="view-subtitle">编辑常用网站和访问统计</p><div class="frame-wrap"><iframe class="frame" id="commonFrame" title="常用网站管理"></iframe></div></section>
      <section class="view" id="view-seo"><h1 class="view-title">SEO 文章</h1><p class="view-subtitle">文章独立发布，不显示在普通教程列表中</p><div class="seo-layout"><div class="panel"><button class="primary" id="newSeo">新建文章</button><div class="list" id="seoList"></div></div><div class="panel"><form id="seoForm"><input type="hidden" id="seoId"><div class="row"><div class="field"><label for="seoSlug">地址标识</label><input id="seoSlug" placeholder="例如 free-ai-api-sites"></div><div class="field"><label for="seoDate">发布日期</label><input id="seoDate" type="date"></div></div><div class="field"><label for="seoTitle">标题</label><input id="seoTitle"></div><div class="field"><label for="seoDescription">摘要</label><textarea id="seoDescription" rows="3"></textarea></div><div class="field"><label for="seoTags">标签</label><input id="seoTags" placeholder="AI, API, 工具"></div><div class="field"><label for="seoContent">正文</label><textarea id="seoContent"></textarea></div><div class="actions"><button class="primary" type="submit">保存发布</button><button class="ghost" type="button" id="deleteSeo">删除</button><span class="muted" id="seoStatus"></span></div></form></div></div></section>
    </main>
  </div>
</section>
<script>
(function(){
  var seoArticles=[]; var currentSeoId=''; var booted=false;
  var $=function(id){return document.getElementById(id)};
  function setView(name){document.querySelectorAll('.side button').forEach(function(btn){btn.classList.toggle('active',btn.dataset.view===name)});document.querySelectorAll('.view').forEach(function(view){view.classList.toggle('active',view.id==='view-'+name)});if(name==='api'&&!$('apiFrame').src)$('apiFrame').src='/api-nav/admin.html?embedded=1';if(name==='common'&&!$('commonFrame').src)$('commonFrame').src='/common-nav/admin.html?embedded=1';}
  function escapeHtml(value){return String(value||'').replace(/[&<>"']/g,function(ch){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]})}
  async function request(path, options){var response=await fetch(path,Object.assign({credentials:'same-origin'},options||{}));if(!response.ok)throw new Error((await response.text())||String(response.status));return response.json()}
  async function loadSeo(){seoArticles=await request('/api/seo');$('seoCount').textContent=seoArticles.length;$('seoList').innerHTML=seoArticles.map(function(item){return '<button class="'+(item.id===currentSeoId?'active':'')+'" data-id="'+escapeHtml(item.id)+'">'+escapeHtml(item.title)+'</button>'}).join('')||'<div class="empty">暂无 SEO 文章</div>';}
  function fillSeo(item){item=item||{id:'',slug:'',title:'',description:'',content:'',tags:[],date:new Date().toISOString().slice(0,10)};currentSeoId=item.id||'';$('seoId').value=item.id||'';$('seoSlug').value=item.slug||'';$('seoDate').value=item.date||'';$('seoTitle').value=item.title||'';$('seoDescription').value=item.description||'';$('seoTags').value=(item.tags||[]).join(', ');$('seoContent').value=item.content||'';document.querySelectorAll('#seoList button').forEach(function(btn){btn.classList.toggle('active',btn.dataset.id===currentSeoId)});}
  async function boot(){if(booted)return;booted=true;$('loginView').style.display='none';$('appView').style.display='block';sessionStorage.setItem('xcbot_admin_unlocked','1');localStorage.setItem('nav_admin_key','session');try{var sites=await request('/api/sites');var common=await request('/api/common-sites');var tutorials=await request('/api/tutorials');$('apiCount').textContent=(sites.sites||sites).length;$('commonCount').textContent=(common.sites||common).length;$('tutorialCount').textContent=tutorials.length;await loadSeo();}catch(error){$('loginError').textContent='后台数据加载失败';}setView('overview');}
  $('loginForm').addEventListener('submit',async function(event){event.preventDefault();$('loginError').textContent='';try{await request('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:$('password').value})});await boot();}catch(error){$('loginError').textContent='Login failed';$('password').select();}});
  $('logoutBtn').addEventListener('click',async function(){await fetch('/admin/logout',{method:'POST',credentials:'same-origin'});sessionStorage.removeItem('xcbot_admin_unlocked');localStorage.removeItem('nav_admin_key');location.reload();});
  document.querySelectorAll('.side button').forEach(function(btn){btn.addEventListener('click',function(){setView(btn.dataset.view)})});
  $('newSeo').addEventListener('click',function(){fillSeo();$('seoTitle').focus()});
  $('seoList').addEventListener('click',function(event){var button=event.target.closest('button[data-id]');if(button)fillSeo(seoArticles.find(function(item){return item.id===button.dataset.id}))});
  $('seoForm').addEventListener('submit',async function(event){event.preventDefault();var item={id:$('seoId').value||String(Date.now()),slug:$('seoSlug').value.trim(),title:$('seoTitle').value.trim(),description:$('seoDescription').value.trim(),content:$('seoContent').value.trim(),tags:$('seoTags').value.split(',').map(function(tag){return tag.trim()}).filter(Boolean),date:$('seoDate').value||new Date().toISOString().slice(0,10)};try{var result=await request('/api/seo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(item)});$('seoStatus').textContent='Saved';await loadSeo();fillSeo(seoArticles.find(function(article){return article.id===result.id})||item);}catch(error){$('seoStatus').textContent='Save failed';}});
  $('deleteSeo').addEventListener('click',async function(){if(!currentSeoId||!confirm('Delete this article?'))return;try{await request('/api/seo',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(seoArticles.filter(function(item){return item.id!==currentSeoId}))});await loadSeo();fillSeo();$('seoStatus').textContent='Deleted';}catch(error){$('seoStatus').textContent='Delete failed';}});
  request('/admin/session').then(function(result){if(result.authenticated)boot()}).catch(function(){});
})();
</script>
</body>
</html>
