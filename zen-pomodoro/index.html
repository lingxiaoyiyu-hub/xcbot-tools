<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>噪音时钟 - XCbot 工具箱</title>
<style>
:root {
  --bg: #090d16;
  --card: #131b2e;
  --card-border: #1e293b;
  --primary: #10b981;
  --primary-hover: #059669;
  --text: #f8fafc;
  --text-muted: #64748b;
  --accent-blue: #3b82f6;
  --accent-orange: #f59e0b;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* Header */
header {
  height: 56px;
  border-bottom: 1px solid var(--card-border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  flex-shrink: 0;
  background: rgba(9, 13, 22, 0.8);
  backdrop-filter: blur(12px);
  z-index: 10;
}
.logo {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.home-btn {
  margin-left: auto;
  color: var(--text-muted);
  font-size: 0.88rem;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: color 0.2s;
}
.home-btn:hover {
  color: var(--primary);
}

/* App Layout */
.app-container {
  flex: 1;
  max-width: 1100px;
  width: 100%;
  margin: 0 auto;
  padding: 24px;
  display: grid;
  grid-template-columns: 1fr 400px;
  gap: 32px;
  align-items: center;
}

@media (max-width: 900px) {
  .app-container {
    grid-template-columns: 1fr;
    gap: 24px;
    padding: 16px;
  }
}

/* Glassmorphism Card Style */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 32px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

/* Left: Pomodoro Section */
.pomodoro-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.status-badge {
  padding: 6px 16px;
  border-radius: 99px;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 24px;
  transition: all 0.3s ease;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.status-focus {
  background: rgba(16, 185, 129, 0.15);
  color: var(--primary);
  border: 1px solid rgba(16, 185, 129, 0.3);
}
.status-break {
  background: rgba(59, 130, 246, 0.15);
  color: var(--accent-blue);
  border: 1px solid rgba(59, 130, 246, 0.3);
}

/* Circular Timer */
.timer-container {
  position: relative;
  width: 280px;
  height: 280px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
}
.timer-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}
.timer-bg-circle {
  fill: none;
  stroke: rgba(255, 255, 255, 0.04);
  stroke-width: 8;
}
.timer-progress-circle {
  fill: none;
  stroke: var(--primary);
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
}
.timer-text {
  font-size: 3.5rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  letter-spacing: -1px;
  z-index: 2;
  color: var(--text);
  text-shadow: 0 0 10px rgba(0,0,0,0.5);
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 16px;
}
.control-btn {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text);
  border-radius: 50%;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  outline: none;
}
.control-btn:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: rgba(255, 255, 255, 0.2);
  transform: scale(1.05);
}
.control-btn.main-play {
  width: 72px;
  height: 72px;
  background: var(--primary);
  border: none;
  color: #090d16;
}
.control-btn.main-play:hover {
  background: var(--primary-hover);
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
}
.control-btn svg {
  fill: currentColor;
}

/* Right: Sound Mixer Section */
.mixer-section {
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.mixer-title {
  font-size: 1.1rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sound-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Mixer Sound Item */
.sound-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid rgba(255, 255, 255, 0.04);
  border-radius: 12px;
  padding: 14px 18px;
  transition: border-color 0.2s, background 0.2s;
}
.sound-item:hover {
  background: rgba(255, 255, 255, 0.04);
  border-color: rgba(255, 255, 255, 0.08);
}
.sound-header {
  display: flex;
  align-items: center;
  gap: 12px;
}
.sound-icon {
  font-size: 1.2rem;
  width: 24px;
  text-align: center;
}
.sound-name {
  font-size: 0.9rem;
  font-weight: 600;
}
.mute-toggle {
  margin-left: auto;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
}
.mute-toggle:hover, .mute-toggle.active {
  color: var(--primary);
}

.volume-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.volume-slider {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.1);
  outline: none;
  accent-color: var(--primary);
  cursor: pointer;
}

/* Audio warning */
.audio-hint {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 12px;
  line-height: 1.4;
}
</style>
<link rel="stylesheet" href="../shared-white.css">
</head>
<body>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <span>噪音时钟</span>
    </div>
    <a href="../" class="home-btn">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
        <polyline points="9 22 9 12 15 12 15 22"></polyline>
      </svg>
      返回工具箱首页
    </a>
  </header>

  <div class="app-container">
    <!-- Left: Pomodoro Section -->
    <div class="card pomodoro-section">
      <div id="statusBadge" class="status-badge status-focus">
        <span>💻 专注时间</span>
      </div>

      <div class="timer-container">
        <svg class="timer-svg" viewBox="0 0 100 100">
          <circle class="timer-bg-circle" cx="50" cy="50" r="45"></circle>
          <circle id="timerProgress" class="timer-progress-circle" cx="50" cy="50" r="45" stroke-dasharray="282.7" stroke-dashoffset="0"></circle>
        </svg>
        <div id="timerText" class="timer-text">25:00</div>
      </div>

      <div class="controls">
        <!-- Reset -->
        <button class="control-btn" id="resetBtn" title="重置">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
          </svg>
        </button>

        <!-- Play/Pause -->
        <button class="control-btn main-play" id="playBtn" title="开始/暂停">
          <svg id="playIcon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </button>

        <!-- Skip -->
        <button class="control-btn" id="skipBtn" title="跳过">
          <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
            <polygon points="5 4 15 12 5 20 5 4"></polygon>
            <line x1="19" y1="5" x2="19" y2="19"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Right: Sound Mixer Section -->
    <div class="card mixer-section">
      <div class="mixer-title">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
        <span>自然音混音台</span>
      </div>

      <div class="sound-list">
        <!-- Rain -->
        <div class="sound-item">
          <div class="sound-header">
            <span class="sound-icon">🌧️</span>
            <span class="sound-name">窗外雨声</span>
            <button class="mute-toggle" data-sound="rain">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              </svg>
            </button>
          </div>
          <div class="volume-row">
            <input type="range" class="volume-slider" data-sound="rain" min="0" max="100" value="0">
          </div>
        </div>

        <!-- Ocean -->
        <div class="sound-item">
          <div class="sound-header">
            <span class="sound-icon">🌊</span>
            <span class="sound-name">潮起潮落</span>
            <button class="mute-toggle" data-sound="ocean">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              </svg>
            </button>
          </div>
          <div class="volume-row">
            <input type="range" class="volume-slider" data-sound="ocean" min="0" max="100" value="0">
          </div>
        </div>

        <!-- Wind -->
        <div class="sound-item">
          <div class="sound-header">
            <span class="sound-icon">🍃</span>
            <span class="sound-name">山谷微风</span>
            <button class="mute-toggle" data-sound="wind">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              </svg>
            </button>
          </div>
          <div class="volume-row">
            <input type="range" class="volume-slider" data-sound="wind" min="0" max="100" value="0">
          </div>
        </div>

        <!-- Campfire -->
        <div class="sound-item">
          <div class="sound-header">
            <span class="sound-icon">🔥</span>
            <span class="sound-name">篝火噼啪</span>
            <button class="mute-toggle" data-sound="campfire">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
              </svg>
            </button>
          </div>
          <div class="volume-row">
            <input type="range" class="volume-slider" data-sound="campfire" min="0" max="100" value="0">
          </div>
        </div>
      </div>

      <div class="audio-hint">
        💡 提示：本白噪音由浏览器 Web Audio API <b>在本地实时合成</b>，无任何网络音频下载，纯离线超省流量。
      </div>
    </div>
  </div>

  <script>
    // Pomodoro settings
    const FOCUS_MINUTES = 25;
    const BREAK_MINUTES = 5;
    const CIRCUMFERENCE = 282.7;

    let isRunning = false;
    let isFocusMode = true;
    let timeLeft = FOCUS_MINUTES * 60;
    let totalTime = FOCUS_MINUTES * 60;
    let timerInterval = null;

    const timerProgress = document.getElementById('timerProgress');
    const timerText = document.getElementById('timerText');
    const statusBadge = document.getElementById('statusBadge');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const resetBtn = document.getElementById('resetBtn');
    const skipBtn = document.getElementById('skipBtn');

    // Timer functions
    function updateTimerDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerText.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      
      const offset = CIRCUMFERENCE - (timeLeft / totalTime) * CIRCUMFERENCE;
      timerProgress.style.strokeDashoffset = offset;
    }

    function toggleTimer() {
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    }

    function startTimer() {
      initAudio(); // Initialize audio context on user interaction
      isRunning = true;
      playIcon.innerHTML = `<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>`;
      timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          switchMode();
          playAlarm();
        }
        updateTimerDisplay();
      }, 1000);
    }

    function pauseTimer() {
      isRunning = false;
      playIcon.innerHTML = `<polygon points="5 3 19 12 5 21 5 3"></polygon>`;
      clearInterval(timerInterval);
    }

    function resetTimer() {
      pauseTimer();
      timeLeft = isFocusMode ? FOCUS_MINUTES * 60 : BREAK_MINUTES * 60;
      totalTime = timeLeft;
      updateTimerDisplay();
    }

    function skipTimer() {
      pauseTimer();
      switchMode();
    }

    function switchMode() {
      isFocusMode = !isFocusMode;
      timeLeft = isFocusMode ? FOCUS_MINUTES * 60 : BREAK_MINUTES * 60;
      totalTime = timeLeft;
      
      if (isFocusMode) {
        statusBadge.className = 'status-badge status-focus';
        statusBadge.innerHTML = '<span>💻 专注时间</span>';
        timerProgress.style.stroke = '#10b981';
      } else {
        statusBadge.className = 'status-badge status-break';
        statusBadge.innerHTML = '<span>☕ 休息时间</span>';
        timerProgress.style.stroke = '#3b82f6';
      }
      resetTimer();
    }

    function playAlarm() {
      try {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 1.3);
      } catch (err) {}
    }

    playBtn.onclick = toggleTimer;
    resetBtn.onclick = resetTimer;
    skipBtn.onclick = skipTimer;

    // --- Web Audio API Programmatic Synthesizers ---
    let audioCtx = null;
    let synths = {};
    let campfireTimer = null;
    let rainTimer = null;

    function initAudio() {
      if (audioCtx) {
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        return;
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Shared noise buffers
      const sampleRate = audioCtx.sampleRate;
      const bufferSize = 2 * sampleRate;
      
      // Generate Pink Noise
      const pinkBuffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
      const pinkData = pinkBuffer.getChannelData(0);
      let b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
      for (let i = 0; i < bufferSize; i++) {
        let white = Math.random() * 2 - 1;
        b0 = 0.99886 * b0 + white * 0.0555179;
        b1 = 0.99332 * b1 + white * 0.0750759;
        b2 = 0.96900 * b2 + white * 0.1538520;
        b3 = 0.86650 * b3 + white * 0.3104856;
        b4 = 0.55000 * b4 + white * 0.5329522;
        b5 = -0.7616 * b5 - white * 0.0168980;
        pinkData[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
        pinkData[i] *= 0.11;
        b6 = white * 0.115926;
      }

      // Generate Brown Noise
      const brownBuffer = audioCtx.createBuffer(1, bufferSize, sampleRate);
      const brownData = brownBuffer.getChannelData(0);
      let lastOut = 0.0;
      for (let i = 0; i < bufferSize; i++) {
        let white = Math.random() * 2 - 1;
        brownData[i] = (lastOut + (0.02 * white)) / 1.02;
        lastOut = brownData[i];
        brownData[i] *= 3.5;
      }

      // --- Setup Synths ---

      // 1. Rain (Brown noise lowpass + pink noise bandpass + synthesized raindrop clicks)
      const rainGain = audioCtx.createGain();
      rainGain.gain.setValueAtTime(0, audioCtx.currentTime);
      rainGain.connect(audioCtx.destination);

      const rainSrcB = audioCtx.createBufferSource();
      rainSrcB.buffer = brownBuffer;
      rainSrcB.loop = true;
      const rainFilterB = audioCtx.createBiquadFilter();
      rainFilterB.type = 'lowpass';
      rainFilterB.frequency.value = 220; // Deep storm rumble
      rainSrcB.connect(rainFilterB);
      rainFilterB.connect(rainGain);
      rainSrcB.start();

      const rainSrcP = audioCtx.createBufferSource();
      rainSrcP.buffer = pinkBuffer;
      rainSrcP.loop = true;
      const rainFilterP = audioCtx.createBiquadFilter();
      rainFilterP.type = 'bandpass';
      rainFilterP.frequency.value = 1000;
      rainFilterP.Q.value = 1.0;
      rainSrcP.connect(rainFilterP);
      rainFilterP.connect(rainGain);
      rainSrcP.start();

      synths.rain = { gainNode: rainGain, targetVol: 0, isMuted: false };

      // 2. Ocean (Brown noise lowpass + pink noise lowpass, modulated by LFO)
      const oceanGain = audioCtx.createGain();
      oceanGain.gain.setValueAtTime(0, audioCtx.currentTime);
      oceanGain.connect(audioCtx.destination);

      const oceanSrcB = audioCtx.createBufferSource();
      oceanSrcB.buffer = brownBuffer;
      oceanSrcB.loop = true;
      const oceanFilterB = audioCtx.createBiquadFilter();
      oceanFilterB.type = 'lowpass';
      oceanFilterB.frequency.value = 250; // Deep wave base
      
      const oceanSrcP = audioCtx.createBufferSource();
      oceanSrcP.buffer = pinkBuffer;
      oceanSrcP.loop = true;
      const oceanFilterP = audioCtx.createBiquadFilter();
      oceanFilterP.type = 'lowpass';
      oceanFilterP.frequency.value = 800; // Foam hiss

      const oceanModB = audioCtx.createGain();
      oceanModB.gain.setValueAtTime(0.4, audioCtx.currentTime);

      const oceanModP = audioCtx.createGain();
      oceanModP.gain.setValueAtTime(0.3, audioCtx.currentTime);

      oceanSrcB.connect(oceanFilterB);
      oceanFilterB.connect(oceanModB);
      oceanModB.connect(oceanGain);
      oceanSrcB.start();

      oceanSrcP.connect(oceanFilterP);
      oceanFilterP.connect(oceanModP);
      oceanModP.connect(oceanGain);
      oceanSrcP.start();

      // Waves modulator (LFO at 0.07Hz = ~14 seconds per wave cycle)
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.setValueAtTime(0.07, audioCtx.currentTime);
      
      const lfoGainB = audioCtx.createGain();
      lfoGainB.gain.value = 0.38;
      lfo.connect(lfoGainB);
      lfoGainB.connect(oceanModB.gain);

      const lfoGainP = audioCtx.createGain();
      lfoGainP.gain.value = 0.28;
      lfo.connect(lfoGainP);
      lfoGainP.connect(oceanModP.gain);
      
      lfo.start();

      synths.ocean = { gainNode: oceanGain, targetVol: 0, isMuted: false };

      // 3. Wind (Pink noise + bandpass with high Q modulated by LFO)
      const windGain = audioCtx.createGain();
      windGain.gain.setValueAtTime(0, audioCtx.currentTime);
      windGain.connect(audioCtx.destination);

      const windSrc = audioCtx.createBufferSource();
      windSrc.buffer = pinkBuffer;
      windSrc.loop = true;
      
      const windFilter = audioCtx.createBiquadFilter();
      windFilter.type = 'bandpass';
      windFilter.frequency.value = 600; // Howling frequency center
      windFilter.Q.value = 8.0; // High Q makes it whistle distinctly

      const windMod = audioCtx.createGain();
      windMod.gain.setValueAtTime(0.3, audioCtx.currentTime);

      windSrc.connect(windFilter);
      windFilter.connect(windMod);
      windMod.connect(windGain);
      windSrc.start();

      // Modulator for wind gusts (LFO at 0.06Hz)
      const windLfo = audioCtx.createOscillator();
      windLfo.type = 'sine';
      windLfo.frequency.setValueAtTime(0.06, audioCtx.currentTime);
      
      // Modulate frequency
      const windLfoFreqGain = audioCtx.createGain();
      windLfoFreqGain.gain.value = 350;
      windLfo.connect(windLfoFreqGain);
      windLfoFreqGain.connect(windFilter.frequency);
      
      // Modulate volume in phase
      const windLfoVolGain = audioCtx.createGain();
      windLfoVolGain.gain.value = 0.25;
      windLfo.connect(windLfoVolGain);
      windLfoVolGain.connect(windMod.gain);
      
      windLfo.start();

      synths.wind = { gainNode: windGain, targetVol: 0, isMuted: false };

      // 4. Campfire (Brown noise rumble + synthesized random crackles & wood snaps)
      const campfireGain = audioCtx.createGain();
      campfireGain.gain.setValueAtTime(0, audioCtx.currentTime);
      campfireGain.connect(audioCtx.destination);

      const campSrc = audioCtx.createBufferSource();
      campSrc.buffer = brownBuffer;
      campSrc.loop = true;
      const campFilter = audioCtx.createBiquadFilter();
      campFilter.type = 'lowpass';
      campFilter.frequency.value = 100;
      campSrc.connect(campFilter);
      campFilter.connect(campfireGain);
      campSrc.start();

      synths.campfire = { gainNode: campfireGain, targetVol: 0, isMuted: false };
    }

    function playCrackle(audioCtx, destNode) {
      const isSnap = Math.random() < 0.25; // 25% chance of wood snap
      const duration = isSnap ? 0.04 : 0.01;
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      
      const decay = isSnap ? 80 : 350;
      for (let i = 0; i < data.length; i++) {
        const t = i / audioCtx.sampleRate;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-t * decay);
      }
      
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      if (isSnap) {
        filter.type = 'bandpass';
        filter.frequency.value = 800 + Math.random() * 600;
        filter.Q.value = 6;
      } else {
        filter.type = 'highpass';
        filter.frequency.value = 3000 + Math.random() * 2000;
      }
      
      const gain = audioCtx.createGain();
      const baseVolume = isSnap ? (0.08 + Math.random() * 0.12) : (0.01 + Math.random() * 0.04);
      gain.gain.value = baseVolume * synths.campfire.gainNode.gain.value;
      
      source.connect(filter);
      filter.connect(gain);
      gain.connect(destNode);
      source.start();
    }

    function campfireCrackleLoop() {
      if (synths.campfire && synths.campfire.targetVol > 0 && !synths.campfire.isMuted) {
        playCrackle(audioCtx, synths.campfire.gainNode);
      }
      const next = 60 + Math.random() * 300;
      campfireTimer = setTimeout(campfireCrackleLoop, next);
    }

    function playRaindrop(audioCtx, destNode) {
      const duration = 0.005 + Math.random() * 0.015; // 5-20ms
      const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < data.length; i++) {
        const t = i / audioCtx.sampleRate;
        data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 400);
      }
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'highpass';
      filter.frequency.value = 2500 + Math.random() * 2000;
      
      const gain = audioCtx.createGain();
      gain.gain.value = (0.01 + Math.random() * 0.05) * synths.rain.gainNode.gain.value;
      
      source.connect(filter);
      filter.connect(gain);
      gain.connect(destNode);
      source.start();
    }

    function rainCrackleLoop() {
      if (synths.rain && synths.rain.targetVol > 0 && !synths.rain.isMuted) {
        playRaindrop(audioCtx, synths.rain.gainNode);
      }
      const next = 20 + Math.random() * 80;
      rainTimer = setTimeout(rainCrackleLoop, next);
    }

    // Mixer UI logic
    document.querySelectorAll('.volume-slider').forEach(slider => {
      slider.oninput = e => {
        initAudio();
        const soundKey = e.target.dataset.sound;
        const val = Number(e.target.value) / 100;
        
        synths[soundKey].targetVol = val;
        updateVolume(soundKey);

        const btn = document.querySelector(`.mute-toggle[data-sound="${soundKey}"]`);
        if (val > 0) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }

        // Start campfire loop if it's campfire
        if (soundKey === 'campfire' && !campfireTimer) {
          campfireCrackleLoop();
        }
        // Start rain loop if it's rain
        if (soundKey === 'rain' && !rainTimer) {
          rainCrackleLoop();
        }
      };
    });

    document.querySelectorAll('.mute-toggle').forEach(btn => {
      btn.onclick = e => {
        initAudio();
        const soundKey = btn.dataset.sound;
        const slider = document.querySelector(`.volume-slider[data-sound="${soundKey}"]`);
        
        if (synths[soundKey].targetVol > 0) {
          // If playing, mute it (set slider to 0)
          synths[soundKey].preMuteVol = synths[soundKey].targetVol;
          synths[soundKey].targetVol = 0;
          slider.value = 0;
          btn.classList.remove('active');
        } else {
          // Unmute (restore volume)
          const restoreVol = synths[soundKey].preMuteVol || 0.5;
          synths[soundKey].targetVol = restoreVol;
          slider.value = restoreVol * 100;
          btn.classList.add('active');
          if (soundKey === 'campfire' && !campfireTimer) {
            campfireCrackleLoop();
          }
          if (soundKey === 'rain' && !rainTimer) {
            rainCrackleLoop();
          }
        }
        updateVolume(soundKey);
      };
    });

    function updateVolume(key) {
      const synth = synths[key];
      if (!synth) return;
      // Exponential volume ramp for natural hearing transition
      synth.gainNode.gain.linearRampToValueAtTime(synth.targetVol, audioCtx.currentTime + 0.15);
    }
  </script>
</body>
</html>
