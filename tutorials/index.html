.article-meta{font-size:.8rem;color:var(--muted);margin-bottom:18px}
.article-summary{background:var(--soft);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:#374151;font-size:.9rem;margin-bottom:18px}
.article-content{font-size:.95rem;color:#1f2937;white-space:pre-wrap;line-height:1.9}
.links{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 0}
.link-btn{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:var(--soft);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:.82rem;font-weight:700;color:var(--blue)}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
.tag{font-size:.72rem;color:var(--muted);background:var(--soft);border:1px solid var(--border);border-radius:999px;padding:2px 8px}
.empty{text-align:center;color:var(--muted);padding:56px 20px;font-size:.95rem}
.footer{text-align:center;color:var(--muted);font-size:.78rem;margin-top:28px}

<script>
(function(){
  var tutorials = [];
  var activeId = '';
  var listEl = document.getElementById('tutorialList');
  var articleEl = document.getElementById('articlePanel');
  var searchInput = document.getElementById('searchInput');
  var fallbackTutorials = [
    {
      id: 'free-ai-api-sites',
      title: '免费公益 AI/API 站点怎么找？',
      summary: '用 XCbot 公益 AI/API 导航查找免费大模型、AI 绘图和 API 中转站点，并判断可用性和使用风险。',
      date: '2026-07-07',
      pinned: true,
      content: '这篇教程已经发布为独立页面，方便搜索引擎收录和分享。点击下方链接阅读全文。',
      tags: ['AI/API', '公益站导航', '免费资源'],
      links: [{ label: '阅读全文', url: 'free-ai-api-sites.html' }]
    },
    {
      id: 'ai-prompt-guide',
      title: 'AI 绘图提示词怎么写？',
      summary: '从主体、场景、风格、光线和构图拆解提示词写法，适合新手快速复制和改写。',
      date: '2026-07-07',
      pinned: true,
      content: '这篇教程已经发布为独立页面，方便搜索引擎收录和分享。点击下方链接阅读全文。',
      tags: ['AI 绘图', '提示词'],
      links: [{ label: '阅读全文', url: 'ai-prompt-guide.html' }]
    },
    {
      id: 'free-game-resources',
      title: '免费游戏资源怎么使用？',
      summary: '了解如何使用游戏资源库搜索资源，识别百度网盘和夸克网盘入口，并注意版权和安全风险。',
      date: '2026-07-07',
      pinned: true,
      content: '这篇教程已经发布为独立页面，方便搜索引擎收录和分享。点击下方链接阅读全文。',
      tags: ['游戏资源', '资源索引'],
      links: [{ label: '阅读全文', url: 'free-game-resources.html' }]
    }
  ];

  function esc(s){ return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function sorted(list){
    return list.slice().sort(function(a,b){ return Number(!!b.pinned) - Number(!!a.pinned); });
  }

  function renderList(){
    var q = searchInput.value.toLowerCase();
    var items = sorted(tutorials).filter(function(t){
      return !q || (t.title || '').toLowerCase().indexOf(q) !== -1 || (t.summary || '').toLowerCase().indexOf(q) !== -1 || (t.tags || []).join(',').toLowerCase().indexOf(q) !== -1;
    });
    if (!items.length) {
      listEl.innerHTML = '<div class="empty" style="padding:30px 8px">暂无匹配教程</div>';
      return;
    }
    listEl.innerHTML = items.map(function(t){
      return '<a class="tutorial-item ' + (t.id === activeId ? 'active' : '') + '" href="#' + encodeURIComponent(t.id) + '" data-id="' + esc(t.id) + '">' +
        '<div class="tutorial-title">' + (t.pinned ? '<span class="pinned">置顶</span>' : '') + '<span>' + esc(t.title) + '</span></div>' +
        '<div class="tutorial-summary">' + esc(t.summary || '点击查看教程内容') + '</div>' +
        '<div class="tutorial-meta">' + esc(t.date || '') + '</div>' +
      '</a>';
    }).join('');
  }

  function renderArticle(id){
    var t = tutorials.find(function(item){ return item.id === id; }) || sorted(tutorials)[0];
    if (!t) {
      articleEl.innerHTML = '<div class="empty">暂无教程内容。</div>';
      return;
    }
    activeId = t.id;
    location.hash = encodeURIComponent(t.id);
    articleEl.innerHTML = '<h2 class="article-title">' + esc(t.title) + '</h2>' +
      '<div class="article-meta">' + esc(t.date || '') + (t.pinned ? ' · 置顶推荐' : '') + '</div>' +
      (t.summary ? '<div class="article-summary">' + esc(t.summary) + '</div>' : '') +
      '<div class="article-content">' + esc(t.content) + '</div>' +
      ((t.links || []).length ? '<div class="links">' + (t.links || []).map(function(link){ return '<a class="link-btn" target="_blank" rel="noopener noreferrer" href="' + esc(link.url) + '">' + esc(link.label) + '</a>'; }).join('') + '</div>' : '') +
      ((t.tags || []).length ? '<div class="tags">' + (t.tags || []).map(function(tag){ return '<span class="tag">' + esc(tag) + '</span>'; }).join('') + '</div>' : '');
    renderList();
  }

  listEl.addEventListener('click', function(e){
    var item = e.target.closest('.tutorial-item');
    if (!item) return;
    e.preventDefault();
    renderArticle(item.getAttribute('data-id'));
  });

  searchInput.addEventListener('input', renderList);

  fetch('https://xcbot-nav-api.lingxiaoyiyu.workers.dev/tutorials?t=' + Date.now(), { cache: 'no-store' })
    .then(function(res){ return res.ok ? res.json() : []; })
    .then(function(data){
      var remote = Array.isArray(data) ? data : [];
      tutorials = remote.length ? remote.concat(fallbackTutorials) : fallbackTutorials;
      renderList();
      renderArticle(decodeURIComponent(location.hash.replace(/^#/, '')) || (sorted(tutorials)[0] && sorted(tutorials)[0].id));
    })
    .catch(function(){
      tutorials = fallbackTutorials;
      renderList();
      renderArticle(decodeURIComponent(location.hash.replace(/^#/, '')) || fallbackTutorials[0].id);
    });
})();
</script>
